<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProctorVision - Exam Proctoring Analytics</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light text-dark">
    <nav class="navbar navbar-light bg-white border-bottom shadow-sm px-4">
      <span class="navbar-brand mb-0 h1 text-primary">ProctorVision</span>
      <span class="badge bg-primary">Beta</span>
    </nav>

    <div class="container mt-4">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card glass p-3">
            <h5 class="mb-3">Upload Session</h5>
            <input type="file" id="videoInput" accept="video/*" class="form-control mb-3" />
            <button class="btn btn-primary w-100" onclick="uploadVideo()">Analyze</button>
            <div id="loader" class="mt-3 text-muted fw-bold" style="display:none">Analyzing... Please wait ⏳</div>
            <div id="preview" class="mt-3" style="display:none">
              <video id="videoPreview" class="w-100 rounded" controls></video>
            </div>
          </div>
          <div class="card glass p-3 mt-4">
            <h6 class="mb-3">Verdict</h6>
            <div id="verdictBadge" class="badge bg-secondary text-dark">Awaiting analysis</div>
            <ul id="reasonsList" class="mt-3 small mb-0"></ul>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card glass p-3 mb-4">
            <h5 class="mb-3">Key Metrics</h5>
            <div class="row text-center" id="kpis">
              <div class="col-md-4">
                <div class="kpi"><span id="kpiFaces" class="kpi-value">-</span><div class="kpi-label">Multi-face %</div></div>
              </div>
              <div class="col-md-4">
                <div class="kpi"><span id="kpiGaze" class="kpi-value">-</span><div class="kpi-label">Gaze away %</div></div>
              </div>
              <div class="col-md-4">
                <div class="kpi"><span id="kpiSpeech" class="kpi-value">-</span><div class="kpi-label">Speech ratio</div></div>
              </div>
            </div>
          </div>

          <div class="card glass p-3">
            <div class="row g-3">
              <div class="col-md-6">
                <h6>Emotion</h6>
                <canvas id="emotionChart"></canvas>
              </div>
              <div class="col-md-6">
                <h6>Video Activity</h6>
                <canvas id="videoChart"></canvas>
              </div>
              <div class="col-12">
                <h6 class="mt-2">Transcript</h6>
                <div id="transcriptBox" class="transcript"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
