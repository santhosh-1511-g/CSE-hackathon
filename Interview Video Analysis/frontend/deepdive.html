<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Analysis | COGNI.HIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --brand-accent: #4f46e5;
            --brand-success: #10b981;
            --brand-warning: #f59e0b;
            --brand-danger: #ef4444;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
            margin: 0;
            transition: background-color 0.5s;
        }

        .sidebar {
            width: 300px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 20;
        }

        .main-content {
            margin-left: 300px;
            min-height: 100vh;
            background: #f8fafc;
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }


        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f8fafc;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const LaptopIcon = () => <i className="bi bi-laptop text-lg"></i>;
        const SearchIcon = () => <i className="bi bi-search"></i>;
        const AlertTriangle = () => <i className="bi bi-exclamation-triangle-fill"></i>;
        const ShieldCheck = ({ size }) => <i className="bi bi-shield-check" style={{ fontSize: size }}></i>;
        const FolderGit2 = ({ size }) => <i className="bi bi-folder-fill" style={{ fontSize: size }}></i>;
        const Users = ({ size }) => <i className="bi bi-people-fill" style={{ fontSize: size }}></i>;
        const Briefcase = ({ size }) => <i className="bi bi-briefcase-fill" style={{ fontSize: size }}></i>;
        const Terminal = ({ size }) => <i className="bi bi-terminal-fill" style={{ fontSize: size }}></i>;
        const BookOpen = ({ size }) => <i className="bi bi-book-fill" style={{ fontSize: size }}></i>;
        const Award = ({ size }) => <i className="bi bi-award-fill" style={{ fontSize: size }}></i>;

        const Gauge = ({ value, max, label, colorClass, icon }) => (
            <div className="glass-card p-6 flex flex-col items-center justify-center border border-slate-200 hover:border-indigo-500/30 transition-all duration-300">
                <div className={`mb-3 ${colorClass}`}>{icon}</div>
                <div className="text-2xl font-black text-slate-900">{value}<span className="text-slate-400 text-sm ml-0.5">/{max}</span></div>
                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{label}</div>
                <div className="w-full h-1.5 bg-slate-100 rounded-full mt-4 overflow-hidden">
                    <div className={`h-full ${colorClass.replace('text-', 'bg-')}`} style={{ width: `${(value / max) * 100}%` }}></div>
                </div>
            </div>
        );

        const Dashboard = () => {
            const [candidates, setCandidates] = useState([]);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [traceId, setTraceId] = useState("");
            const [isDeepDive, setIsDeepDive] = useState(false);
            const [uploadedPhotos, setUploadedPhotos] = useState({});

            const handlePhotoUpload = async (e) => {
                const file = e.target.files[0];
                if (file && traceId) {
                    const blobUrl = URL.createObjectURL(file);
                    setUploadedPhotos(prev => ({ ...prev, [traceId]: blobUrl }));
                    try {
                        const formData = new FormData();
                        formData.append('candidate_id', traceId);
                        formData.append('file', file);
                        const resp = await fetch('/api/candidate/photo', { method: 'POST', body: formData });
                        if (resp.ok) {
                            const result = await resp.json();
                            if (result.profile_pic) setUploadedPhotos(prev => ({ ...prev, [traceId]: result.profile_pic }));
                        }
                    } catch (err) { console.error('Photo upload error:', err); }
                }
            };

            const downloadPDF = async () => {
                const id = traceId || new URLSearchParams(window.location.search).get('id');
                if (id) {
                    window.open(`/api/report/pdf/${id}`, '_blank');
                }
            };

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('id');
                setTraceId(id);

                const fetchData = async () => {
                    try {
                        const listsRes = await fetch("/results");
                        if (listsRes.ok) {
                            const listsJson = await listsRes.json();
                            const processed = listsJson.results.filter(r => (r.status || "").toLowerCase() === "processed")
                                .sort((a, b) => (b.integrity_index || 0) - (a.integrity_index || 0));
                            setCandidates(processed);
                            if (!id && processed.length > 0) {
                                window.location.search = `?id=${processed[0]._id}`;
                                return;
                            }
                        }
                        if (id) {
                            const response = await fetch(`/api/report/${id}`);
                            if (response.ok) {
                                const json = await response.json();
                                if (!json.error) setData(json);
                            }
                        }
                    } catch (err) { console.error("Fetch error:", err); }
                    setLoading(false);
                };
                fetchData();
            }, [traceId]);

            const currentRank = candidates.findIndex(c => c._id === traceId) + 1;
            const totalCandidates = candidates.length;

            const candInfo = candidates.find(c => c._id === traceId) || {};
            const name = candInfo.candidate_name || data?.candidate_name || "Anonymous Candidate";
            const photoUrl = uploadedPhotos[traceId] || candInfo?.profile_pic || data?.profile_pic || data?.resume_profile?.profile_pic || null;

            return (
                <div className="flex bg-[#f8fafc] min-h-screen">
                    {/* Sidebar */}
                    <aside className="sidebar flex flex-col border-r border-slate-200 shadow-sm">
                        <div className="p-6 border-b border-slate-100">
                            <div className="flex items-center gap-2 mb-6">
                                <div className="w-3 h-3 bg-indigo-600 rounded-sm"></div>
                                <span className="font-black text-xs tracking-[0.2em] text-slate-900">COGNI.HIRE</span>
                            </div>
                            <h2 className="text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2 mb-4">
                                <i className="bi bi-people-fill"></i> Candidates
                            </h2>
                            <div className="relative">
                                <span className="absolute left-3 top-2 text-slate-400"><SearchIcon /></span>
                                <input type="text" placeholder="Search Filter..." className="pl-10 pr-4 py-2 bg-slate-50 w-full rounded-xl text-xs outline-none border border-slate-200 text-slate-600 focus:border-indigo-500 transition-all" />
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {candidates.map(c => (
                                <div key={c._id} onClick={() => { setTraceId(c._id); setIsDeepDive(false); window.history.pushState({}, '', `?id=${c._id}`); }}
                                    className={`p-4 rounded-xl cursor-pointer flex items-center gap-3 transition-all duration-300 ${c._id === traceId ? 'bg-indigo-50 border border-indigo-100' : 'hover:bg-slate-50 border border-transparent'}`}>
                                    <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600 border border-slate-200">
                                        {(c.candidate_name || "A")[0].toUpperCase()}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className={`font-bold text-xs truncate ${c._id === traceId ? 'text-indigo-600' : 'text-slate-700'}`}>{c.candidate_name || "Anonymous"}</div>
                                        <div className="text-[9px] text-slate-400 font-bold uppercase tracking-tighter mt-0.5">{c.selected_role || 'General Talent'}</div>
                                    </div>
                                    <div className={`w-1.5 h-1.5 rounded-full ${c.integrity_index > 80 ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                </div>
                            ))}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="main-content flex-1 flex flex-col p-8">
                        {/* Breadcrumbs */}
                        <div className="flex justify-between items-center mb-10">
                            <div className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] flex items-center gap-2">
                                <a href="index.html" className="hover:text-indigo-600 transition-colors">Core Hub</a>
                                <span>/</span>
                                <span className={!isDeepDive ? "text-slate-900" : "cursor-pointer hover:text-indigo-600"} onClick={() => setIsDeepDive(false)}>Profile</span>
                                {isDeepDive && (
                                    <><span>/</span> <span className="text-slate-900">Deep-Dive Analysis</span></>
                                )}
                            </div>
                            <div className="flex gap-3">
                            </div>
                        </div>

                        {loading ? (
                            <div className="flex-1 flex items-center justify-center">
                                <div className="text-indigo-500 pulse font-black tracking-widest text-xs uppercase">Initializing Neural Sequence...</div>
                            </div>
                        ) : data ? (
                            !isDeepDive ? (
                                /* OVERVIEW VIEW */
                                <div className="max-w-4xl mx-auto w-full">
                                    <div className="glass-card p-10 flex flex-col md:flex-row items-center gap-10">
                                        <div className="relative group cursor-pointer" onClick={() => document.getElementById('photo-upload').click()}>
                                            <div className="w-48 h-48 rounded-full overflow-hidden border-4 border-slate-50 shadow-xl relative">
                                                {photoUrl ? (
                                                    <img src={photoUrl} className="w-full h-full object-cover" alt="Profile" />
                                                ) : (
                                                    <div className="w-full h-full bg-slate-100 flex items-center justify-center text-5xl text-indigo-200 font-black">
                                                        {name[0].toUpperCase()}
                                                    </div>
                                                )}
                                                <div className="absolute inset-0 bg-indigo-600/60 flex flex-col items-center justify-center text-[10px] font-black text-white uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-all duration-300 rounded-full">
                                                    <i className="bi bi-camera-fill text-xl mb-2"></i>
                                                    Update
                                                </div>
                                            </div>
                                            <input id="photo-upload" type="file" className="hidden" accept="image/*" onChange={handlePhotoUpload} />
                                        </div>
                                        <div className="flex-1 text-center md:text-start">
                                            <div className="inline-block px-3 py-1 bg-emerald-50 border border-emerald-200 rounded-full text-emerald-600 text-[9px] font-black tracking-widest uppercase mb-4">
                                                <i className="bi bi-patch-check-fill me-1"></i> Analysis Finalized
                                            </div>
                                            <h2 className="text-5xl font-black text-slate-900 tracking-tighter mb-2">{name}</h2>
                                            <div className="text-slate-400 font-bold uppercase tracking-widest text-xs mb-8 flex flex-wrap items-center justify-center md:justify-start gap-4">
                                                <span>{data.selected_role || 'General Candidate'}</span>
                                                {currentRank > 0 && (
                                                    <>
                                                        <span className="w-1.5 h-1.5 bg-slate-200 rounded-full"></span>
                                                        <span className="px-3 py-1 bg-amber-50 border border-amber-200 text-amber-600 rounded-lg text-[10px] font-black">
                                                            RANK: #{currentRank} / {totalCandidates}
                                                        </span>
                                                    </>
                                                )}
                                            </div>
                                            <div className="flex flex-wrap items-center justify-center md:justify-start gap-4">
                                                <button
                                                    className="px-8 py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-900/40 flex items-center gap-3 group"
                                                    onClick={() => setIsDeepDive(true)}>
                                                    <i className="bi bi-cpu-fill text-lg group-hover:rotate-90 transition-transform duration-500"></i>
                                                    OPEN NEURAL DEEP ANALYSIS
                                                </button>
                                                <button
                                                    className="px-8 py-4 bg-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-200 transition-all flex items-center gap-3 border border-slate-200"
                                                    onClick={downloadPDF}>
                                                    <i className="bi bi-file-earmark-pdf-fill text-lg text-rose-500"></i>
                                                    DOWNLOAD PDF REPORT
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">
                                        <div className="glass-card p-6 border border-slate-800/50">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Overall Fit Index</h3>
                                            <div className="flex items-center gap-6">
                                                <div className={`text-4xl font-black ${data.final_score > 70 ? 'text-indigo-400' : (data.final_score > 50 ? 'text-amber-400' : 'text-rose-400')}`}>{data.final_score}%</div>
                                                <p className="text-xs text-slate-400 font-medium leading-relaxed">Aggregated performance across technical, communication, and integrity domains.</p>
                                            </div>
                                        </div>
                                        <div className="glass-card p-6 border border-slate-800/50">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Communication Efficacy</h3>
                                            <div className="flex items-center gap-6">
                                                <div className="text-4xl font-black text-cyan-400">{data.performance_breakdown?.communication || 0}%</div>
                                                <p className="text-xs text-slate-400 font-medium leading-relaxed">Derived from vocal pace, sentiment stability, and semantic depth in video.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                /* DEEP ANALYSIS VIEW (Neural Fit Analytics) */
                                <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in transition-all duration-700">
                                    <header className="flex justify-between items-start border-b border-slate-200 pb-6">
                                        <div>
                                            <h1 className="text-3xl font-extrabold text-slate-900 mb-1 border-l-4 border-indigo-600 pl-3">Neural Fit Analytics</h1>
                                            <p className="text-slate-400 font-mono text-xs pl-4 uppercase tracking-widest">Target Role: <span className="text-indigo-600 font-bold">{data.selected_role || 'General Ingestion'}</span></p>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <button 
                                                onClick={downloadPDF}
                                                className="h-10 px-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 hover:bg-rose-100 transition-colors">
                                                <i className="bi bi-file-earmark-pdf-fill"></i>
                                                Export Report
                                            </button>
                                            <div className="text-right">
                                                <p className="text-slate-400 font-mono text-[10px] mb-1 uppercase">Session Trace ID</p>
                                                <p className="text-slate-600 font-mono text-xs font-bold">{traceId.toUpperCase()}</p>
                                            </div>
                                            <button 
                                                onClick={() => setIsDeepDive(false)}
                                                className="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-slate-800 transition-colors">
                                                <i className="bi bi-x-lg"></i>
                                            </button>
                                        </div>
                                    </header>

                                    {/* CANDIDATE EVALUATION REPORT (STRICT HR FORMAT) */}
                                    <div className="space-y-6">
                                        <div className={`p-8 rounded-3xl border shadow-xl transition-all duration-500 bg-white`}>
                                            <div className="flex flex-col md:flex-row justify-between items-start gap-8">
                                                <div className="flex-1 space-y-6">
                                                    <div>
                                                        <div className="flex items-center gap-3 mb-4">
                                                            <div className={`w-3 h-3 rounded-full pulse ${data.resume_profile?.status === 'SELECTED' ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                                            <h2 className="text-2xl font-black uppercase tracking-tighter text-slate-900">
                                                                Candidate Evaluation Report
                                                            </h2>
                                                        </div>
                                                        <div className="flex flex-wrap gap-4 mb-6">
                                                            <div className="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl">
                                                                <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Role Match</span>
                                                                <span className="text-lg font-bold text-indigo-600">{data.resume_profile?.role_match_score || 0}%</span>
                                                            </div>
                                                            <div className="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl">
                                                                <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Technical Fit</span>
                                                                <span className="text-lg font-bold text-indigo-600">{data.resume_profile?.technical_score || 0}%</span>
                                                            </div>
                                                            <div className="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl">
                                                                <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Communication</span>
                                                                <span className="text-lg font-bold text-indigo-600">{data.resume_profile?.communication_score || 0}%</span>
                                                            </div>
                                                            <div className="px-4 py-2 bg-indigo-50 border border-indigo-100 rounded-xl">
                                                                <span className="text-[10px] font-black text-indigo-400 uppercase block mb-1">Overall Fit</span>
                                                                <span className="text-lg font-bold text-indigo-700">{data.resume_profile?.overall_fit_score || 0}%</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                        <div className="space-y-3">
                                                            <h4 className="text-[10px] font-black text-emerald-600 uppercase tracking-widest border-l-2 border-emerald-500 pl-2">Key Strengths</h4>
                                                            <ul className="space-y-2">
                                                                {(data.resume_profile?.key_strengths || []).map((s, i) => (
                                                                    <li key={i} className="text-xs text-slate-600 flex items-start gap-2">
                                                                        <span className="text-emerald-500 mt-0.5">✓</span> {s}
                                                                    </li>
                                                                ))}
                                                                {(!data.resume_profile?.key_strengths || data.resume_profile.key_strengths.length === 0) && (
                                                                    <li className="text-xs text-slate-400 italic">No specific strengths highlighted</li>
                                                                )}
                                                            </ul>
                                                        </div>
                                                        <div className="space-y-3">
                                                            <h4 className="text-[10px] font-black text-rose-600 uppercase tracking-widest border-l-2 border-rose-500 pl-2">Missing Skills</h4>
                                                            <ul className="space-y-2">
                                                                {(data.resume_profile?.missing_skills || []).map((s, i) => (
                                                                    <li key={i} className="text-xs text-slate-600 flex items-start gap-2">
                                                                        <span className="text-rose-500 mt-0.5">•</span> {s}
                                                                    </li>
                                                                ))}
                                                                {(!data.resume_profile?.missing_skills || data.resume_profile.missing_skills.length === 0) && (
                                                                    <li className="text-xs text-emerald-600 italic">Meets all core skill requirements</li>
                                                                )}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="w-full md:w-64 space-y-4">
                                                    <div className={`p-6 rounded-2xl border text-center ${data.resume_profile?.status === 'SELECTED' ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Final Decision</span>
                                                        <div className={`text-2xl font-black ${data.resume_profile?.status === 'SELECTED' ? 'text-emerald-700' : 'text-rose-700'}`}>
                                                            {data.resume_profile?.status || 'PENDING'}
                                                        </div>
                                                    </div>
                                                    <div className="p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase mb-2">Primary Reasoning</p>
                                                        <p className="text-xs text-slate-600 leading-relaxed italic">"{data.resume_profile?.reason || 'Evaluation in progress...'}"</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {data.resume_profile?.status === 'NOT SELECTED' && data.resume_profile?.suggested_role !== 'None' && (
                                            <div className="bg-indigo-50 border border-indigo-200 p-6 rounded-3xl animate-in fade-in slide-in-from-top-4">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-indigo-600 shadow-sm border border-indigo-100">
                                                        <Users size="24px" />
                                                    </div>
                                                    <div>
                                                        <h3 className="text-indigo-900 font-black text-sm uppercase tracking-tight">Intelligent Role Suggestion</h3>
                                                        <div className="flex items-center gap-2 mt-1">
                                                            <span className="text-xs text-slate-500">Best Match:</span>
                                                            <span className="text-xs font-bold text-indigo-700 uppercase tracking-wide px-2 py-0.5 bg-indigo-100 rounded-lg">{data.resume_profile?.suggested_role}</span>
                                                        </div>
                                                        <p className="text-xs text-indigo-600 mt-2 font-medium italic">"{data.resume_profile?.suggestion_reason}"</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>


                                    {data.critical_warnings && data.critical_warnings.length > 0 && (
                                        <div className="bg-rose-50 border border-rose-200 p-8 rounded-3xl shadow-sm mb-8">
                                            <div className="flex items-center gap-4 mb-6 text-rose-600">
                                                <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center border border-rose-100 shadow-sm">
                                                    <AlertTriangle />
                                                </div>
                                                <div>
                                                    <h3 className="text-slate-900 font-black text-lg tracking-tight">Anomalies Detected</h3>
                                                    <p className="text-[10px] text-rose-500 font-mono uppercase tracking-[0.2em]">High-Confidence Behavioral Red-Flags</p>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {data.critical_warnings.map((w, i) => (
                                                    <div key={i} className="p-4 bg-white border border-rose-100 rounded-2xl shadow-sm">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="text-[10px] font-black uppercase text-rose-600 tracking-widest">{w.tag}</div>
                                                            <div className="px-2 py-0.5 bg-rose-500 text-white rounded text-[8px] font-black">{Math.round((w.confidence || 0) * 100)}% CONF</div>
                                                        </div>
                                                        <div className="text-xs text-slate-600 leading-relaxed font-medium">{w.message || 'Automatic pattern detection suggests behavioral risk.'}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <Gauge value={Math.round(data.performance_breakdown?.technical || 0)} max={100} label="Behavioral Efficacy" colorClass="text-indigo-400" icon={<LaptopIcon />} />
                                        <Gauge value={Math.round(data.integrity_index)} max={100} label="Integrity Index" colorClass={data.integrity_index < 50 ? 'text-rose-500' : 'text-emerald-500'} icon={data.integrity_index < 50 ? <AlertTriangle /> : <ShieldCheck size="20px" />} />
                                        <Gauge value={Math.round(data.performance_breakdown?.communication || 0)} max={100} label="Comm. Efficiency" colorClass="text-amber-400" icon={<Users size="20px" />} />
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-8 px-2">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 border border-indigo-100 shadow-sm">
                                                    <Briefcase size="20px" />
                                                </div>
                                                <div>
                                                    <h3 className="text-slate-900 font-black text-lg tracking-tight">Verified Evidence Matrix</h3>
                                                    <p className="text-xs text-slate-400 font-mono uppercase">Role-Specific Qualification Audit</p>
                                                </div>
                                            </div>
                                        </div>

                                        {data.report_data ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                {[
                                                    { key: "Skills", icon: <Terminal size="18px" />, col: "text-indigo-400", bg: "bg-indigo-400/5", border: "border-indigo-500/10", alt: ["Skillset", "Technical Skills"] },
                                                    { key: "Projects", icon: <FolderGit2 size="18px" />, col: "text-emerald-400", bg: "bg-emerald-400/5", border: "border-emerald-500/10", alt: ["Academic Projects", "Personal Projects"] },
                                                    { key: "Workshops/Trainings", icon: <BookOpen size="18px" />, col: "text-cyan-400", bg: "bg-cyan-400/5", border: "border-cyan-500/10", alt: ["Workshops", "Trainings", "Seminars"] },
                                                    { key: "Certifications", icon: <Award size="18px" />, col: "text-amber-400", bg: "bg-amber-400/5", border: "border-amber-500/10", alt: ["Certificates", "Achievements"] },
                                                    { key: "Internships", icon: <Users size="18px" />, col: "text-purple-400", bg: "bg-purple-400/5", border: "border-purple-500/10", alt: ["Internship Experience"] },
                                                    { key: "Work Experience", icon: <Briefcase size="18px" />, col: "text-rose-400", bg: "bg-rose-400/5", border: "border-rose-500/10", alt: ["Experience", "Professional History", "Job History"] }
                                                ].map((item, i) => {
                                                    // Robust Key Lookup
                                                    let itemData = data.report_data[item.key];
                                                    if (!itemData && item.alt) {
                                                        for (let altKey of item.alt) {
                                                            if (data.report_data[altKey]) {
                                                                itemData = data.report_data[altKey];
                                                                break;
                                                            }
                                                        }
                                                    }

                                                    itemData = itemData || { status: "NOT FOUND", details: "None" };

                                                    // Specialized Synthesis for Skills
                                                    if (item.key === "Skills" && (!itemData.details || itemData.details === "None")) {
                                                        const foundSkills = (data.skill_alignment?.found || []);
                                                        if (foundSkills.length > 0) {
                                                            itemData = { status: "FOUND", details: foundSkills.join(", ") };
                                                        }
                                                    }

                                                    const isFound = (itemData.status || "").toUpperCase() === "FOUND";
                                                    return (
                                                        <div key={i} className={`group bg-slate-50 border border-slate-200 rounded-2xl p-6 transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-1`}>
                                                            <div className="flex justify-between items-start mb-5">
                                                                <div className={`p-2.5 rounded-xl bg-white border border-slate-100 shadow-sm group-hover:${item.col} transition-colors`}>
                                                                    {item.icon}
                                                                </div>
                                                                <span className={`text-[9px] px-2.5 py-1 rounded-full font-black tracking-widest uppercase mb-4 border transition-all ${isFound ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-rose-50 text-rose-600 border-rose-200'}`}>
                                                                    {itemData.status || "NOT FOUND"}
                                                                </span>
                                                            </div>

                                                            <h4 className="text-slate-900 font-bold text-xs uppercase tracking-wider mb-2">{item.key}</h4>
                                                            <div className={`text-xs font-medium leading-relaxed min-h-[40px] whitespace-pre-line ${isFound ? 'text-slate-600' : 'text-slate-400 italic'}`}>
                                                                {itemData.details === "None" || !itemData.details ? `No verified records identified.` : itemData.details}
                                                            </div>
                                                        </div>
                                                    );
                                                })}

                                            </div>
                                        ) : (
                                            <div className="text-center py-10 text-slate-500 font-mono italic">
                                                Neural data synchronization pending...
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-center">
                                <div className="w-20 h-20 bg-rose-500/10 rounded-full flex items-center justify-center text-rose-500 mb-6">
                                    <AlertTriangle />
                                </div>
                                <h3 className="text-xl font-bold text-white mb-2">Trace Data Unavailable</h3>
                                <p className="text-slate-500 text-sm max-w-md">The requested neural session trace could not be located in the primary cluster. Verification required.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>

</html>
