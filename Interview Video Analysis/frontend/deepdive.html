<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Deep-Dive | COGNI.HIRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#141E2F',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        brand: {
                            danger: '#f43f5e', // Rose-500
                            success: '#10b981', // Emerald-500
                            warning: '#f59e0b', // Amber-500
                            accent: '#6366f1'   // Indigo-500
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif;}
        .score-ring { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Lucide SVG Components ---
        const Terminal = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        );
        const FolderGit2 = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 20H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.7.9H20a2 2 0 0 1 2 2v5"/><circle cx="13" cy="12" r="2"/><path d="M18 19c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5Z"/><circle cx="18" cy="19" r="2"/><path d="M21 15V9"/></svg>
        );
        const BookOpen = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const Award = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
        );
        const Users = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const Briefcase = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        );

        const AlertTriangle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        );
        const ShieldCheck = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const LaptopIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></svg>
        );
        const UserCheck = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
        );

        // --- UI Components ---
        const Gauge = ({ value, max, label, colorClass, icon }) => {
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (value / max) * circumference;
            const strokeColor = colorClass.includes('danger') ? '#f43f5e' : colorClass.includes('success') ? '#10b981' : colorClass.includes('warning') ? '#f59e0b' : '#6366f1';

            return (
                <div className="flex flex-col items-center bg-slate-850 p-6 rounded-2xl border border-slate-800 shadow-xl w-full">
                    <div className={`mb-3 ${colorClass}`}>{icon}</div>
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <svg className="transform -rotate-90 w-24 h-24">
                            <circle cx="48" cy="48" r={radius} stroke="#1e293b" strokeWidth="8" fill="transparent" />
                            <circle 
                                cx="48" cy="48" r={radius} 
                                stroke={strokeColor} 
                                strokeWidth="8" 
                                fill="transparent" 
                                strokeDasharray={circumference} 
                                strokeDashoffset={offset} 
                                className="score-ring"
                                strokeLinecap="round"
                            />
                        </svg>
                        <div className="absolute flex flex-col items-center justify-center">
                            <span className="text-2xl font-bold text-slate-100">{value}</span>
                        </div>
                    </div>
                    <span className="mt-4 font-semibold text-slate-400 tracking-wider text-xs uppercase">{label}</span>
                </div>
            );
        };

        const Dashboard = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [traceId, setTraceId] = useState("");

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('id');
                if (!id) {
                    setError("No Candidate ID provided.");
                    setLoading(false);
                    return;
                }
                setTraceId(id);

                const fetchReport = async () => {
                    try {
                        const response = await fetch(`/api/report/${id}`);
                        if (!response.ok) {
                            const errorBody = await response.text();
                            console.error("SERVER ERROR HTML DETECTED:", errorBody);
                            alert(`Server Error (${response.status}). Check console for details.`);
                            return;
                        }
                        const json = await response.json();
                        if (json.error) throw new Error(json.error);
                        console.log("FULL CANDIDATE DATA:", json);
                        setData(json);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchReport();
            }, []);

            if (loading) return <div className="flex h-screen items-center justify-center text-xl text-slate-500 font-mono">Loading Neural Insights...</div>;
            if (error) return <div className="flex h-screen items-center justify-center text-xl text-rose-500 font-mono">Error: {error}</div>;

            const finalScore = data.final_score;
            let statusColor = 'text-brand-success bg-emerald-950/40 border-emerald-900';
            if (finalScore < 50) statusColor = 'text-brand-danger bg-rose-950/40 border-rose-900';
            else if (finalScore < 80) statusColor = 'text-brand-warning bg-amber-950/40 border-amber-900';
            
            const timeline = data.gaze_timeline || [];
            const transcript = data.raw_data?.transcript || "Transcript processing incomplete.";

            return (
                <div className="min-h-screen p-8 max-w-6xl mx-auto space-y-8">
                    {/* Header */}
                    {/* Header */}
                    <header className="flex justify-between items-end border-b border-slate-800 pb-6">
                        <div>
                            <h1 className="text-3xl font-extrabold text-slate-100 mb-1 border-l-4 border-indigo-500 pl-3">Neural Fit Analytics</h1>
                            <p className="text-slate-500 font-mono text-xs pl-4 uppercase tracking-widest">Target Role: <span className="text-indigo-400 font-bold">{data.selected_role || 'General Ingestion'}</span></p>
                        </div>
                        <div className="text-right">
                           <p className="text-slate-500 font-mono text-[10px] mb-1">SESSION TRACE ID</p>
                           <p className="text-slate-100 font-mono text-xs font-bold">{traceId.toUpperCase()}</p>
                        </div>
                    </header>

                    {/* TOP VERDICT CARD */}
                    <div className={`p-8 rounded-3xl border-2 shadow-2xl transition-all duration-500 ${data.selection_status === 'SELECTED' ? 'bg-emerald-950/20 border-emerald-500/30' : 'bg-rose-950/20 border-rose-500/30'}`}>
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div className="flex-1">
                                <div className="flex items-center gap-3 mb-3">
                                    <div className={`w-3 h-3 rounded-full pulse ${data.selection_status === 'SELECTED' ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                    <h2 className={`text-2xl font-black uppercase tracking-tighter ${data.selection_status === 'SELECTED' ? 'text-emerald-400' : 'text-rose-400'}`}>
                                        Selection Verdict: {data.selection_status}
                                    </h2>
                                </div>
                                <p className="text-slate-300 text-lg font-medium leading-relaxed italic">
                                    "{data.selection_reason}"
                                </p>
                            </div>
                            <div className="flex flex-col items-center justify-center bg-slate-900/50 p-6 rounded-2xl border border-slate-800 min-w-[200px]">
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Technical Fit Index</span>
                                <div className="text-4xl font-black text-white">{data.role_fit_score || 0}<span className="text-slate-600 text-xl">/10</span></div>
                                <div className="w-full h-1.5 bg-slate-800 rounded-full mt-4 overflow-hidden">
                                    <div className={`h-full transition-all duration-1000 ${data.role_fit_score >= 7 ? 'bg-emerald-500' : data.role_fit_score >= 5 ? 'bg-amber-500' : 'bg-rose-500'}`} style={{ width: `${(data.role_fit_score || 0) * 10}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* GAUGES */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <Gauge value={Math.round(data.performance_breakdown?.technical || 0)} max={100} label="Behavioral Efficacy" colorClass="text-brand-accent" icon={<LaptopIcon/>} />
                        <Gauge value={Math.round(data.integrity_index)} max={100} label="Integrity Index" colorClass={data.integrity_index < 50 ? 'text-brand-danger' : 'text-brand-success'} icon={data.integrity_index < 50 ? <AlertTriangle/> : <ShieldCheck size={20}/>} />
                        <Gauge value={data.resume_score || 0} max={10} label="Resume Score" colorClass="text-indigo-400" icon={<FolderGit2 size={20}/>} />
                        <Gauge value={data.communication_skills || 0} max={100} label="Comm. Efficiency" colorClass="text-cyan-400" icon={<Users size={20}/>} />
                    </div>

                    {/* ADVANCED AI EVALUATION TILES */}
                    <div className="bg-slate-900/30 p-8 rounded-3xl border border-slate-800 backdrop-blur-md shadow-2xl">
                        <div className="flex justify-between items-center mb-8 px-2">
                           <div className="flex items-center gap-4">
                              <div className="w-10 h-10 bg-brand-accent/20 rounded-xl flex items-center justify-center text-brand-accent shadow-[0_0_15px_rgba(79,70,229,0.2)]">
                                 <Briefcase size={20}/>
                              </div>
                              <div>
                                 <h3 className="text-white font-black text-lg tracking-tight">Role-Specific Evidence Matrix</h3>
                                 <p className="text-xs text-slate-500 font-mono">STRICT VALIDATION ENGINE · NEURAL PARSER v4.1</p>
                              </div>
                           </div>
                           <div className="hidden md:flex items-center gap-2 px-4 py-1.5 bg-brand-success/10 border border-brand-success/20 rounded-full text-brand-success text-[10px] font-black tracking-widest uppercase">
                              <div className="w-1.5 h-1.5 bg-brand-success rounded-full pulse"></div> Evidence Verified (Dual-Match)
                           </div>
                        </div>

                        {data.report_data ? (
                           <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                              {[
                                 { key: "Skills", icon: <Terminal size={18}/>, col: "text-indigo-400", bg: "bg-indigo-400/5", border: "border-indigo-500/10" },
                                 { key: "Projects", icon: <FolderGit2 size={18}/>, col: "text-emerald-400", bg: "bg-emerald-400/5", border: "border-emerald-500/10" },
                                 { key: "Workshops/Trainings", icon: <BookOpen size={18}/>, col: "text-cyan-400", bg: "bg-cyan-400/5", border: "border-cyan-500/10" },
                                 { key: "Certifications", icon: <Award size={18}/>, col: "text-amber-400", bg: "bg-amber-400/5", border: "border-amber-500/10" },
                                 { key: "Internships", icon: <Users size={18}/>, col: "text-purple-400", bg: "bg-purple-400/5", border: "border-purple-500/10" },
                                 { key: "Work Experience", icon: <Briefcase size={18}/>, col: "text-rose-400", bg: "bg-rose-400/5", border: "border-rose-500/10" }
                              ].map((item, i) => {
                                 const itemData = data.report_data[item.key] || { status: "NOT FOUND", details: "None" };
                                 const isFound = itemData.status === "FOUND";

                                 return (
                                    <div key={i} className={`group ${item.bg} border ${item.border} rounded-2xl p-6 transition-all duration-300 hover:bg-slate-800/40 hover:scale-[1.02] hover:-translate-y-1 shadow-sm`}>
                                       <div className="flex justify-between items-start mb-5">
                                          <div className={`p-2.5 rounded-xl bg-slate-900 border border-slate-700 shadow-inner group-hover:${item.col} transition-colors`}>
                                             {item.icon}
                                          </div>
                                          <span className={`text-[9px] px-2.5 py-1 rounded-full font-black tracking-widest uppercase mb-4 border transition-all ${isFound ? 'bg-emerald-950/40 text-emerald-400 border-emerald-800' : 'bg-rose-950/40 text-rose-400 border-rose-900'}`}>
                                             {itemData.status}
                                          </span>
                                       </div>
                                       
                                       <h4 className="text-slate-100 font-bold text-xs uppercase tracking-wider mb-2">{item.key}</h4>
                                       <div className={`text-xs font-medium leading-relaxed min-h-[40px] ${isFound ? 'text-slate-300' : 'text-slate-500 italic'}`}>
                                          {itemData.details === "None" ? `Records missing for this profile.` : itemData.details}
                                       </div>

                                       <div className="mt-4 pt-4 border-t border-slate-800 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity">
                                          <span className="text-[9px] font-mono text-slate-600">NODE REF: {item.key.substring(0,3).toUpperCase()}</span>
                                          <div className={`w-1.5 h-1.5 rounded-full ${isFound ? 'bg-brand-success' : 'bg-slate-700'}`}></div>
                                       </div>
                                    </div>
                                 );
                              })}
                           </div>
                        ) : null}
                    </div>

                    {/* Summary Row */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Executive Reason Box integrated here */}
                        <div className="lg:col-span-3 p-6 bg-slate-850 rounded-2xl border border-slate-800 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex-1">
                                <h3 className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-3">Linguistic Intelligence</h3>
                                <div className="flex items-center gap-6">
                                    {(() => {
                                        const score = data.communication_skills || 0;
                                        let tier = { label: "Poor", color: "text-brand-danger", bg: "bg-rose-500/10" };
                                        if (score >= 80) tier = { label: "Excellent", color: "text-brand-success", bg: "bg-emerald-500/10" };
                                        else if (score >= 60) tier = { label: "Good", color: "text-amber-400", bg: "bg-amber-500/10" };
                                        else if (score >= 40) tier = { label: "Average", color: "text-amber-600", bg: "bg-amber-600/10" };
                                        
                                        return (
                                            <div className="flex flex-col items-center">
                                                <span className={`px-4 py-2 rounded-xl font-black uppercase tracking-tighter border border-current/20 ${tier.bg} ${tier.color}`}>
                                                    {tier.label}
                                                </span>
                                                <span className="text-[10px] text-slate-500 mt-2 font-bold uppercase">Performance Tier</span>
                                            </div>
                                        );
                                    })()}
                                    <div className="flex-1 border-l border-slate-800 pl-6">
                                        <p className="text-slate-400 text-sm leading-relaxed max-w-2xl">
                                            The candidate's profile demonstrates a <span className="text-slate-200 font-bold">{data.communication_skills}%</span> linguistic efficiency rating. 
                                            Our neural engine detected professional verb density and structural clarity sufficient for the selected path.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MIDDLE ROW: Gaze Timeline */}
                    <div className="bg-slate-850 p-6 rounded-2xl border border-slate-800 shadow-lg">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-sm font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2">
                                Gaze Deviation Timeline
                            </h3>
                            <div className="flex gap-2">
                                <span className="text-xs bg-slate-900 border border-slate-700 px-3 py-1 rounded-full text-slate-400 font-mono">
                                    Avg Dev: {Math.round((timeline.reduce((a,b)=>a+b,0)/Math.max(1, timeline.length))*100)}%
                                </span>
                                <span className={`text-xs px-3 py-1 rounded-full font-mono border ${timeline.filter(v => v > 0.4).length > 2 ? 'bg-rose-950/50 border-rose-900 text-rose-400' : 'bg-slate-900 border-slate-700 text-slate-400'}`}>
                                    Anomalies: {timeline.filter(v => v > 0.4).length}
                                </span>
                            </div>
                        </div>
                        <div className="flex h-16 w-full gap-1 items-end bg-slate-900/50 p-2 rounded-lg border border-slate-800/50">
                            {timeline.map((val, idx) => (
                                <div key={idx} 
                                     className={`flex-1 rounded-t-sm transition-all duration-300 ${val > 0.4 ? 'bg-rose-500' : 'bg-emerald-500'}`} 
                                     style={{ height: `${Math.max(10, val * 100)}%`, opacity: val > 0.4 ? 0.9 : 0.6 }}
                                     title={`Deviation: ${Math.round(val*100)}%`}>
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-between text-xs text-slate-500 mt-2 font-mono px-2">
                            <span>00:00</span>
                            <span>Session End</span>
                        </div>
                    </div>

                    {/* Neural Fit Analytics */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Strengths & Weaknesses */}
                        <div className="bg-slate-850 p-6 rounded-2xl border border-slate-800 shadow-lg">
                            <h3 className="text-emerald-400 font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                                <ShieldCheck/> Neural Strengths
                            </h3>
                            <ul className="space-y-3">
                                {data.resume_profile?.strengths?.map((s, i) => (
                                    <li key={i} className="flex items-start gap-3 text-sm text-slate-300">
                                        <div className="mt-1 w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                                        {s}
                                    </li>
                                ))}
                            </ul>
                            
                            <h3 className="text-rose-400 font-bold text-xs uppercase tracking-widest mt-8 mb-4 flex items-center gap-2">
                                <AlertTriangle/> Optimization Nodes (Weaknesses)
                            </h3>
                            <ul className="space-y-3">
                                {data.resume_profile?.weaknesses?.map((w, i) => (
                                    <li key={i} className="flex items-start gap-3 text-sm text-slate-400 italic">
                                        <div className="mt-1 w-1.5 h-1.5 rounded-full bg-rose-500"></div>
                                        {w}
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* Resume vs Interview Alignment Breakdown */}
                        <div className="bg-slate-850 p-6 rounded-2xl border border-slate-800 shadow-lg">
                            <h3 className="text-brand-accent font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                                <LaptopIcon/> Skill Verification Matrix
                            </h3>
                            <div className="space-y-4">
                                {data.skill_alignment && data.skill_alignment.length > 0 ? (
                                    data.skill_alignment.map((skill, i) => (
                                        <div key={i} className="bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                                            <div>
                                                <div className="text-slate-200 font-bold text-sm tracking-wide capitalize">{skill.skill}</div>
                                                <div className="text-[10px] text-slate-500 font-mono mt-0.5">{skill.mentions} transcript mentions</div>
                                            </div>
                                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter ${skill.mentions >= 1 ? 'bg-emerald-950/40 text-emerald-400 border border-emerald-900' : 'bg-amber-950/40 text-amber-400 border border-amber-900'}`}>
                                                {skill.mentions >= 1 ? 'Verified Depth' : 'Latency Found'}
                                            </span>
                                        </div>
                                    ))
                                ) : (
                                    <div className="text-slate-500 text-xs italic p-4 text-center border border-dashed border-slate-800 rounded-xl">
                                        Waiting for neural cross-referencing completion...
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* BOTTOM ROW: Details & Transcript */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Red Flags & Breakdown */}
                        <div className="lg:col-span-1 space-y-6">
                            <div className="bg-slate-850 p-6 rounded-2xl border border-slate-800 h-full">
                                <h3 className="text-rose-500 font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <AlertTriangle/> Critical Warnings
                                </h3>
                                {!data.critical_warnings || data.critical_warnings.length === 0 ? (
                                    <p className="text-slate-500 text-sm italic">No warnings detected during the session.</p>
                                ) : (
                                    <ul className="space-y-3">
                                        {data.critical_warnings.map((warning, i) => (
                                            <li key={i} className={`flex justify-between items-center text-xs p-3 rounded border border-slate-800/50 leading-relaxed font-medium ${warning.confidence >= 0.8 ? 'bg-emerald-900/30 text-emerald-200' : 'bg-rose-900/30 text-rose-200'}`}>
                                                <span>{warning.tag || warning}</span>
                                                <span className="font-mono bg-slate-900/40 px-2 py-0.5 rounded text-[10px] tracking-wide">
                                                    {warning.confidence !== undefined ? (warning.confidence * 100).toFixed(0) : '100'}%
                                                </span>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                                
                                <div className="mt-8 pt-6 border-t border-slate-800">
                                    <h3 className="text-slate-400 font-bold text-xs uppercase tracking-widest mb-4">Neural Pillars</h3>
                                    <div className="space-y-3 text-sm font-mono">
                                        <div className="flex justify-between"><span className="text-slate-500">Soft Skills</span> <span className="text-emerald-400">{data.performance_breakdown?.soft_skills}%</span></div>
                                        <div className="flex justify-between"><span className="text-slate-500">Communication</span> <span className="text-indigo-400">{data.performance_breakdown?.communication}%</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Transcript */}
                        <div className="lg:col-span-2 bg-slate-850 p-6 rounded-2xl border border-slate-800">
                            <h3 className="text-slate-300 font-bold text-xs uppercase tracking-widest mb-4">Live Transcription</h3>
                            <div className="prose prose-invert max-w-none text-slate-400 font-serif leading-loose text-lg" 
                                 dangerouslySetInnerHTML={{
                                    __html: transcript
                                        .replace(/facebook|spare time|girls/gi, match => `<span class="bg-rose-500/20 text-rose-400 border-b border-rose-500/50 pb-0.5 px-1">${match}</span>`)
                                        .replace(/hardware|software|bsnl|technology|system|data|supervising/gi, match => `<span class="bg-emerald-500/20 text-emerald-400 border-b border-emerald-500/50 pb-0.5 px-1">${match}</span>`)
                                 }}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
